// ================= GEOMETRIA DERIVADA (J, Cw, ho, rts) =================
function propiedades(perfil){
  const p = Object.assign({}, perfil);
  const ho = p.h - p.tf;
  const Cw = p.Iy*ho*ho/4;
  const J = (2*p.bf*Math.pow(p.tf,3) + p.hw*Math.pow(p.tw,3))/3;
  const rts = Math.sqrt(Math.sqrt(p.Iy*Cw)/p.Sx);
  p.ho=ho; p.Cw=Cw; p.J=J; p.rts=rts; p.A=p.Ag;
  return p;
}

// ================= APOYOS =================
function solicitaciones(tipo,q,L){
  if(tipo==='art-art') return {Mu:q*L*L/8, Vu:q*L/2, deltaCoef:5/384};
  if(tipo==='emp-emp') return {Mu:q*L*L/12, Vu:q*L/2, deltaCoef:1/384};
  if(tipo==='emp-art') return {Mu:q*L*L/8, Vu:5*q*L/8, deltaCoef:1/185};
  if(tipo==='voladizo') return {Mu:q*L*L/2, Vu:q*L, deltaCoef:1/8};
  throw new Error('tipo de apoyo desconocido');
}
function flechaCalc(tipo,qServ,L,E,Ix){
  const s = solicitaciones(tipo,qServ,L);
  return s.deltaCoef*qServ*Math.pow(L,4)/(E*Ix);
}

// ================= COMPACIDAD =================
function clasificarAla(bf,tf,Fy,E){
  const lam=(bf/2)/tf, lamP=0.38*Math.sqrt(E/Fy), lamR=1.0*Math.sqrt(E/Fy);
  const clase = lam<=lamP?'Compacta':(lam<=lamR?'No compacta':'Esbelta');
  return {lam,lamP,lamR,clase};
}
function clasificarAlma(hw,tw,Fy,E){
  const lam=hw/tw, lamP=3.76*Math.sqrt(E/Fy), lamR=5.70*Math.sqrt(E/Fy);
  const clase = lam<=lamP?'Compacta':(lam<=lamR?'No compacta':'Esbelta');
  return {lam,lamP,lamR,clase};
}
function clasificarSeccion(geo,Fy,E){
  const ala=clasificarAla(geo.bf,geo.tf,Fy,E), alma=clasificarAlma(geo.hw,geo.tw,Fy,E);
  const orden={'Compacta':0,'No compacta':1,'Esbelta':2};
  const final = orden[ala.clase]>=orden[alma.clase]?ala.clase:alma.clase;
  return {ala,alma,claseFinal:final};
}

// ================= FLEXION (CIRSOC 301-05 Cap. F) =================
function verificarFlexion(Mu,geo,Fy,Lb,clase,E,Cb,phi){
  Cb = Cb||1.0; phi = phi||0.9;
  const Zx=geo.Zx, Sx=geo.Sx, ry=geo.ry, rts=geo.rts, J=geo.J, Cw=geo.Cw, ho=geo.ho;
  const Mp = Fy*Zx;
  if(clase.claseFinal !== 'Compacta'){
    return {verifica:null, modo:'Seccion no compacta: requiere revision manual (Cap. F3-F5), no implementado'};
  }
  const Lp = 1.76*ry*Math.sqrt(E/Fy);
  const term1 = (J*1.0)/(Sx*ho);
  const Lr = 1.95*rts*(E/(0.7*Fy))*Math.sqrt(term1+Math.sqrt(term1*term1+6.76*Math.pow(0.7*Fy/E,2)));
  let Mn, modo;
  if(Lb<=Lp){ Mn=Mp; modo='Fluencia (Lb<=Lp)'; }
  else if(Lb<=Lr){ Mn=Math.min(Cb*(Mp-(Mp-0.7*Fy*Sx)*(Lb-Lp)/(Lr-Lp)), Mp); modo='LTB inelastico (Lp<Lb<=Lr)'; }
  else { const Fcr=(Cb*Math.PI*Math.PI*E)/Math.pow(Lb/rts,2)*Math.sqrt(1+0.078*(J/(Sx*ho))*Math.pow(Lb/rts,2)); Mn=Math.min(Fcr*Sx,Mp); modo='LTB elastico (Lb>Lr)'; }
  const phiMn = phi*Mn, ratio = Mu/phiMn;
  return {Mn,phiMn,ratio,verifica:Mu<=phiMn,modo,Lp,Lr,pct:ratio*100};
}

// ================= CORTE (Cap. G) =================
function verificarCorte(Vu,geo,Fy,E,phi,kv){
  phi=phi||0.9; kv=kv||5.0;
  const hw=geo.hw, tw=geo.tw, Aw=hw*tw, lam=hw/tw;
  const lim1=2.24*Math.sqrt(E/Fy), lim2=1.10*Math.sqrt(kv*E/Fy), lim3=1.37*Math.sqrt(kv*E/Fy);
  let Cv, phiV;
  if(lam<=lim1){Cv=1.0; phiV=1.0;}
  else if(lam<=lim2){Cv=1.0; phiV=phi;}
  else if(lam<=lim3){Cv=lim2/lam; phiV=phi;}
  else {Cv=1.51*kv*E/(lam*lam*Fy); phiV=phi;}
  const Vn=0.6*Fy*Aw*Cv, phiVn=phiV*Vn, ratio=Vu/phiVn;
  return {Vn,phiVn,Cv,ratio,verifica:Vu<=phiVn,pct:ratio*100};
}

// ================= CALCULO COMPLETO DE VIGA =================
function calcularViga(inp){
  const perfilBase = PERFILES[inp.tipoPerfil][inp.tamano];
  const geo = propiedades(perfilBase);
  const Fy = FY[inp.acero];
  const Lcm = inp.L*100;
  const Lb = (inp.Lb ? inp.Lb : inp.L)*100;

  const pesoKN = perfilBase.peso*9.81/1000;
  const qDServ = inp.D*inp.b + pesoKN;
  const qLServ = inp.Lc*inp.b;
  const qServ = qDServ+qLServ;
  const qu = 1.2*qDServ+1.6*qLServ;
  const quCm = qu/100, qServCm = qServ/100;

  const sol = solicitaciones(inp.apoyo, quCm, Lcm);
  const clase = clasificarSeccion(geo, Fy, E_AC);
  const flex = verificarFlexion(sol.Mu, geo, Fy, Lb, clase, E_AC);
  const corte = verificarCorte(sol.Vu, geo, Fy, E_AC);
  const fmax = flechaCalc(inp.apoyo, qServCm, Lcm, E_AC, geo.Ix);
  const fadm = Lcm/inp.Lsobre;
  const flecha = {fmax, fadm, ratio:fmax/fadm, verifica:fmax<=fadm, pct:fmax/fadm*100};

  return {geo, Fy, qDServ, qLServ, qServ, qu, Mu:sol.Mu, Vu:sol.Vu, clase, flex, corte, flecha, Lcm, Lb};
}

function deformadaPath(apoyo, ampPx){
  // formas normalizadas (esquematicas, no exactas) para cada condicion de apoyo
  const N=24, pts=[];
  for(let i=0;i<=N;i++){
    const x=i/N; let y;
    if(apoyo==='art-art') y = x*(1-x*x*2+x*x*x) * (1); // aprox simetrica, pico centro
    else if(apoyo==='emp-emp') y = (x*x*(1-x)*(1-x))*4;
    else if(apoyo==='emp-art') y = (x*x*(1-x))*2.6;
    else y = (x*x*(3-x))/2; // voladizo, x de 0(fijo) a 1(libre)
    pts.push(y);
  }
  const maxY = Math.max(...pts) || 1;
  return pts.map(y=> (y/maxY)*ampPx );
}

function beamSVG(apoyo, fmaxCm){
  const W=680,H=220, x0=70,x1=610, yBeam=70, ampPx=45;
  const ys = deformadaPath(apoyo, ampPx);
  const N = ys.length-1;
  let path='';
  for(let i=0;i<=N;i++){
    const x = x0 + (x1-x0)*i/N;
    const y = yBeam + 55 + ys[i];
    path += (i===0?'M':'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
  }
  let supportsLeft='', supportsRight='';
  const pinTriangle = (cx,cy)=>`<polygon points="${cx},${cy} ${cx-15},${cy+28} ${cx+15},${cy+28}" fill="none" stroke="#1a1a18" stroke-width="1"/><line x1="${cx-20}" y1="${cy+28}" x2="${cx+20}" y2="${cy+28}" stroke="#1a1a18" stroke-width="1"/>`;
  const roller = (cx,cy)=>`<circle cx="${cx}" cy="${cy+8}" r="7" fill="none" stroke="#1a1a18" stroke-width="1"/><line x1="${cx-18}" y1="${cy+28}" x2="${cx+18}" y2="${cy+28}" stroke="#1a1a18" stroke-width="1"/>`;
  const wall = (cx,cy)=>`<line x1="${cx}" y1="${cy-30}" x2="${cx}" y2="${cy+30}" stroke="#1a1a18" stroke-width="3"/>`;

  if(apoyo==='art-art'){ supportsLeft=pinTriangle(x0,yBeam); supportsRight=roller(x1,yBeam); }
  else if(apoyo==='emp-emp'){ supportsLeft=wall(x0,yBeam); supportsRight=wall(x1,yBeam); }
  else if(apoyo==='emp-art'){ supportsLeft=wall(x0,yBeam); supportsRight=roller(x1,yBeam); }
  else { supportsLeft=wall(x0,yBeam); supportsRight=''; }

  return `<svg width="100%" viewBox="0 0 ${W} ${H}" role="img" style="margin-top:10px;">
    <title>Esquema de la viga y su deformada</title>
    <line x1="${x0}" y1="${yBeam}" x2="${x1}" y2="${yBeam}" stroke="#1a1a18" stroke-width="3" stroke-linecap="round"/>
    ${supportsLeft}${supportsRight}
    <path d="${path}" fill="none" stroke="#D85A30" stroke-width="2" stroke-dasharray="4 4"/>
    <line x1="${x0}" y1="${yBeam+55}" x2="${x1}" y2="${yBeam+55}" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="${(x0+x1)/2}" y="${H-14}" text-anchor="middle" font-size="12" fill="#8a887f">deformada esquem&aacute;tica &middot; f max = ${fmt(fmaxCm,2)} cm</text>
  </svg>`;
}

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">

        <div style="font-size:17px;font-weight:600;">${inp.tipoPerfil} ${inp.tamano} &middot; L=${fmt(inp.L,2)} m &middot; ${nombreApoyo(inp.apoyo)}</div>
        <div style="font-size:12px;color:#8a887f;">Lb=${fmt(inp.Lb?inp.Lb:inp.L,2)} m &middot; acero ${inp.acero} &middot; qu=${fmt(r.qu,2)} kN/m &middot; qserv=${fmt(r.qServ,2)} kN/m</div>
      </div>
      <div style="font-size:12px;padding:4px 10px;border-radius:8px;background:${claseTxt==='Compacta'?'#eef3e8':'#f4e6d8'};color:${claseTxt==='Compacta'?'#2f5d1f':'#8a5a1f'};">${claseTxt}</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;">
      <div class="vv-metric ${metricClass(flexOk)}">
        <div class="lbl">Flexi&oacute;n</div>
        <div class="val">${r.flex.pct!==undefined? fmt(r.flex.pct,0)+'%':'&mdash;'}</div>
        <div class="st">${metricLabel(flexOk)}</div>
      </div>
      <div class="vv-metric ${metricClass(corteOk)}">
        <div class="lbl">Corte</div>
        <div class="val">${fmt(r.corte.pct,0)}%</div>
        <div class="st">${metricLabel(corteOk)}</div>
      </div>
      <div class="vv-metric ${metricClass(flechaOk)}">
        <div class="lbl">Flecha</div>
        <div class="val">${fmt(r.flecha.pct,0)}%</div>
        <div class="st">${metricLabel(flechaOk)}</div>
      </div>
    </div>

    <div style="margin-top:10px;font-size:12px;color:#8a887f;">
      Compacidad &mdash; ala: ${r.clase.ala.clase} (&lambda;=${fmt(r.clase.ala.lam,1)}, &lambda;p=${fmt(r.clase.ala.lamP,1)}) &middot;
      alma: ${r.clase.alma.clase} (&lambda;=${fmt(r.clase.alma.lam,1)}, &lambda;p=${fmt(r.clase.alma.lamP,1)})
    </div>

    ${beamSVG(inp.apoyo, r.flecha.fmax)}
  </div>`;

  document.getElementById('dashboard').innerHTML = html;
}

function calcularYMostrar(){
  const inp = leerInputs();
  const r = calcularViga(inp);
  renderDashboard(r, inp);
  document.getElementById('tabla_optimo').innerHTML = '';
}

function buscarOptimo(){
  const inp = leerInputs();
  const candidatos = [];
  ['IPN'].forEach(tipo=>{
    Object.keys(PERFILES[tipo]).forEach(tam=>{
      candidatos.push({tipo, tam, peso:PERFILES[tipo][tam].peso});
    });
  });
  candidatos.sort((a,b)=>a.peso-b.peso);

  let encontrado = null;
  const intentos = [];
  for(const c of candidatos){
    const inp2 = Object.assign({}, inp, {tipoPerfil:c.tipo, tamano:c.tam});
    const r = calcularViga(inp2);
    const compacta = r.clase.claseFinal==='Compacta';
    const flexOk = r.flex.verifica===true;
    const corteOk = r.corte.verifica;
    const flechaOk = r.flecha.verifica;
    const todoOk = compacta && flexOk && corteOk && flechaOk;
    intentos.push({perfil:c.tipo+' '+c.tam, peso:c.peso, compacta, flexPct:r.flex.pct, cortePct:r.corte.pct, flechaPct:r.flecha.pct, todoOk});
    if(todoOk && !encontrado){ encontrado = {c, r, inp2}; break; }
  }

  if(encontrado){
    document.getElementById('in_tamano').value = encontrado.c.tam;
    renderDashboard(encontrado.r, encontrado.inp2);
  } else {
    document.getElementById('dashboard').innerHTML = '<div class="vv-card">Ning&uacute;n perfil de la lista verific&oacute; todas las condiciones.</div>';
  }

  let tabla = `<div class="vv-card"><h2 class="vv-h">Perfiles evaluados (ordenados por peso)</h2>
    <table class="vv-t"><tr><th>Perfil</th><th>kg/m</th><th>Compacta</th><th>Flexi&oacute;n %</th><th>Corte %</th><th>Flecha %</th></tr>`;
  intentos.forEach(i=>{
    tabla += `<tr class="${i.todoOk?'vv-t-ok':''}"><td>${i.perfil}</td><td>${fmt(i.peso,1)}</td><td>${i.compacta?'si':'no'}</td>
      <td>${i.flexPct!==undefined?fmt(i.flexPct,0):'-'}</td><td>${fmt(i.cortePct,0)}</td><td>${fmt(i.flechaPct,0)}</td></tr>`;
    if(i.todoOk) return;
  });
  tabla += '</table></div>';
  document.getElementById('tabla_optimo').innerHTML = tabla;
}

calcularYMostrar();
</script>
</div>
